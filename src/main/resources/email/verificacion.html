<!DOCTYPE html>
<html>
<body style="margin:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0" style="background:white;border-radius:10px;overflow:hidden;">

                <!-- HEADER -->
                <tr>
                    <td style="padding:30px;text-align:center;border-bottom:1px solid #eee;">

                        <img src="https://res.cloudinary.com/da1fjtztu/image/upload/v1776831227/WhatsApp_Image_2026-04-21_at_11.12.42_PM_ql3hkc.jpg"
                             width="120"
                             style="display:block;margin:auto;margin-bottom:10px;">

                        <h2 style="margin:0;font-size:22px;color:#1a3a4a;">
                            FlyTrack
                        </h2>

                    </td>
                </tr>

                <!-- BODY -->
                <tr>
                    <td style="padding:40px;text-align:center;">

                        <h1 style="margin-top:0;color:#1a3a4a;">
                            Verifica tu identidad
                        </h1>

                        <p style="color:#555;font-size:14px;">
                            Usa este código para consultar tus vuelos
                        </p>

                        <div style="margin:30px auto;font-size:42px;font-weight:bold;letter-spacing:10px;color:#621ca8;">
                            {{CODE}}
                        </div>

                        <p style="color:#777;font-size:13px;">
                            Este código expira en {{TIME}}.
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background:#f5f7f8;padding:30px;text-align:center;">
                        <p style="font-size:12px;color:#666;margin:0;">
                            Este correo fue enviado porque intentaste consultar tus reservas en FlyTrack.
                        </p>

                        <p style="font-size:10px;color:#bbb;margin-top:20px;">
                            © {{YEAR}} FlyTrack
                        </p>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
