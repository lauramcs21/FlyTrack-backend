# ===== DATABASE (PostgreSQL en producción) =====
# URL y username se pasan por variable de entorno desde Cloud Run
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
# Password desde Secret Manager de GCP
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===== ACTUATOR PARA HEALTH CHECKS =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
info.app.name=@project.name@
info.app.version=@project.version@

# ===== LOGGING PARA PRODUCCIÓN =====
logging.level.root=INFO
logging.level.com.flytrack=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== EMAIL CONFIGURATION =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8
app.mail.from=${APP_MAIL_FROM}

# ===== BREVO API KEY =====
brevo.api.key=${BREVO_API_KEY}

# ===== JWT SECRET =====
app.jwt.secret=${APP_JWT_SECRET}

# ===== SERVER CONFIG FOR CLOUD RUN =====
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ===== DESHABILITAR CONSOLAS DE DEBUG EN PROD =====
spring.h2.console.enabled=false
